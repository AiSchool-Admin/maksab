name: Auto-sync feature branch with main

on:
  push:
    branches:
      - main
      - 'claude/*'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine branches to sync
        id: branches
        run: |
          git fetch --all
          PUSHED_BRANCH="${GITHUB_REF#refs/heads/}"

          if [ "$PUSHED_BRANCH" = "main" ]; then
            BRANCHES=$(git branch -r | grep 'origin/claude/' | sed 's|origin/||' | tr -s ' ' | tr '\n' ' ')
          else
            BRANCHES="$PUSHED_BRANCH"
          fi

          echo "branches=$BRANCHES" >> $GITHUB_OUTPUT
          echo "Syncing branches: $BRANCHES"

      - name: Sync each branch with main
        run: |
          for branch in ${{ steps.branches.outputs.branches }}; do
            echo "=== Syncing $branch with main ==="
            git checkout "$branch" || continue

            if git merge-base --is-ancestor origin/main HEAD 2>/dev/null; then
              echo "✅ $branch already up to date with main"
              continue
            fi

            if git merge origin/main --ff-only 2>/dev/null; then
              echo "✅ Fast-forward merge for $branch"
              git push origin "$branch"
              continue
            fi

            if git merge origin/main --no-edit --strategy-option=ours 2>/dev/null; then
              echo "✅ Auto-merged $branch with main (preferring branch)"
              git push origin "$branch"
              continue
            fi

            git merge --abort 2>/dev/null || true
            echo "⚠️ Could not auto-sync $branch — skipping"
          done
