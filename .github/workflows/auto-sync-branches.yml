name: Auto-sync feature branch with main

# Automatically merges main into the feature branch after any push to main.
# Prevents recurring merge conflicts in auto-deploy PRs.

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Find all claude/* branches
        id: branches
        run: |
          git fetch --all
          BRANCHES=$(git branch -r | grep 'origin/claude/' | sed 's|origin/||' | tr '\n' ' ')
          echo "branches=$BRANCHES" >> $GITHUB_OUTPUT
          echo "Found branches: $BRANCHES"

      - name: Sync each branch with main
        run: |
          for branch in ${{ steps.branches.outputs.branches }}; do
            echo "=== Syncing $branch with main ==="
            git checkout "$branch" || continue

            # Try fast-forward merge first (no conflicts possible)
            if git merge origin/main --ff-only 2>/dev/null; then
              echo "✅ Fast-forward merge successful for $branch"
              git push origin "$branch"
              continue
            fi

            # Try regular merge preferring OUR version (feature branch is newer)
            # This keeps all our WIP changes intact while recording the merge
            if git merge origin/main --no-edit --strategy-option=ours 2>/dev/null; then
              echo "✅ Auto-merged $branch with main (preferring branch)"
              git push origin "$branch"
              continue
            fi

            # If merge failed, abort and log — don't force anything destructive
            git merge --abort 2>/dev/null || true
            echo "⚠️ Could not auto-sync $branch — skipping (will need manual resolution)"
          done
