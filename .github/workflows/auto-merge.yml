name: Auto-merge claude branches
on:
  push:
    branches: ['claude/**']

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create PR and merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head "${{ github.ref_name }}" \
            --title "Auto-deploy: ${{ github.ref_name }}" \
            --body "Automated PR from Claude Code" \
            || echo "PR already exists"

          sleep 30

          gh pr merge "${{ github.ref_name }}" \
            --squash \
            --delete-branch \
            --admin \
            || echo "Merge failed or already merged"
