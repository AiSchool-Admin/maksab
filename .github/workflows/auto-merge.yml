name: Auto-merge claude branches
on:
  push:
    branches: ['claude/**']

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create PR and merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "Branch: $BRANCH"

          # Create PR (ignore error if already exists)
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Auto-deploy: $BRANCH" \
            --body "Automated PR from Claude Code" \
            2>/dev/null || echo "PR already exists"

          sleep 10

          # Get PR number by branch name
          PR_NUMBER=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null)
          echo "PR Number: $PR_NUMBER"

          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            echo "No PR found for branch $BRANCH"
            exit 0
          fi

          # Merge by PR number
          gh pr merge "$PR_NUMBER" \
            --squash \
            --admin \
            --delete-branch \
            || echo "Merge failed"
